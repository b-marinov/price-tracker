<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Фантастико — Промоции</title>
</head>
<body>
<div class="promotions-listing">

    <div class="product-card">
        <img src="https://fantastico.bg/images/promo/domati-1kg.jpg" alt="Домати">
        <h3 class="product-name">Домати български</h3>
        <span class="product-price">3,49 лв.</span>
        <span class="product-unit">кг</span>
    </div>

    <div class="product-card">
        <img src="https://fantastico.bg/images/promo/kiselo-mlyako.jpg" alt="Кисело мляко">
        <h3 class="product-name">Кисело мляко 2%</h3>
        <span class="product-price">1,69 лв.</span>
        <span class="product-unit">бр</span>
    </div>

    <div class="promotion-item">
        <img data-src="https://fantastico.bg/images/promo/shunka-slice.jpg" alt="Шунка">
        <h3 class="product-name">Шунка свинска нарязана</h3>
        <span class="product-price">7,99 лв.</span>
        <span class="product-unit">кг</span>
    </div>

    <div class="product-card">
        <img src="https://fantastico.bg/images/promo/hlqb-bql.jpg" alt="Хляб">
        <h3 class="product-name">Хляб бял нарязан 650г</h3>
        <span class="product-price">1,49 лв.</span>
        <span class="product-unit">бр</span>
    </div>

    <div class="product-card">
        <img src="https://fantastico.bg/images/promo/bira-zagorka.jpg" alt="Бира Загорка">
        <h3 class="product-name">Бира Загорка 500мл</h3>
        <span class="product-price">1,89 лв.</span>
        <span class="product-unit">бр</span>
    </div>

</div>

<div class="pagination">
    <a class="next-page" href="https://fantastico.bg/promotions?page=2">Следваща &raquo;</a>
</div>

</body>
</html>
