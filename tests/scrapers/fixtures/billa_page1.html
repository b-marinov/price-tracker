<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Billa България — Продукти</title>
</head>
<body>
<div class="product-listing">

    <div class="product-tile" data-category="Плодове и зеленчуци">
        <img src="https://ssm.billa.bg/images/product/domati-1kg.jpg" alt="Домати">
        <h3 class="product-title">Домати български</h3>
        <span class="price">3,99 лв.</span>
        <span class="product-unit">кг</span>
        <span class="product-category">Плодове и зеленчуци</span>
    </div>

    <div class="product-tile" data-category="Млечни продукти">
        <img src="https://ssm.billa.bg/images/product/mlyako-1l.jpg" alt="Прясно мляко">
        <h3 class="product-title">Прясно мляко 3.6% 1л</h3>
        <span class="price">2,49 лв.</span>
        <span class="product-unit">л</span>
        <span class="product-category">Млечни продукти</span>
    </div>

    <div class="product-tile" data-category="Хляб и тестени">
        <img data-src="https://ssm.billa.bg/images/product/hlyab-tipov.jpg" alt="Хляб типов">
        <h3 class="product-title">Хляб типов нарязан 500г</h3>
        <span class="price">1,79 лв.</span>
        <span class="product-unit">бр</span>
        <span class="product-category">Хляб и тестени</span>
    </div>

    <div class="product-tile" data-category="Месо и риба">
        <img src="https://ssm.billa.bg/images/product/kaimq-smes.jpg" alt="Кайма смес">
        <h3 class="product-title">Кайма смес охладена</h3>
        <span class="price">12,99 лв.</span>
        <span class="product-unit">кг</span>
        <span class="product-category">Месо и риба</span>
    </div>

    <article class="product" data-category="Напитки">
        <img src="https://ssm.billa.bg/images/product/coca-cola-500ml.jpg" alt="Кока-Кола">
        <span class="product-name">Кока-Кола 500мл</span>
        <span class="product-price">1,69 лв.</span>
        <span class="unit">бр</span>
        <span class="category">Напитки</span>
    </article>

    <article class="product" data-category="Сладкарски изделия">
        <img src="https://ssm.billa.bg/images/product/biskviti-digestive.jpg" alt="Бисквити">
        <h3 class="product-title">Бисквити Digestive 250г</h3>
        <span class="price">3,29 лв.</span>
        <span class="product-unit">бр</span>
    </article>

</div>

<div class="pagination">
    <a class="next-page" href="https://ssm.billa.bg/products?page=2">Следваща &raquo;</a>
</div>
